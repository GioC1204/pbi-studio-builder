version: '3.8'

services:
  frontend:
    build: ./FRONTEND
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./FRONTEND:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./BACKEND
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pbi_studio
      - JWT_SECRET=change_this_in_production
      - GENERATED_PROJECTS_PATH=/app/GENERATED-PROJECTS
    volumes:
      - ./BACKEND:/app
      - ./GENERATED-PROJECTS:/app/GENERATED-PROJECTS
      - /app/node_modules
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pbi_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./BACKEND/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
